services:
  db:
    image: postgres:16-alpine
    container_name: crz_db
    environment:
      POSTGRES_USER: crz
      POSTGRES_PASSWORD: crz_local
      POSTGRES_DB: crz_monitor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crz -d crz_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
