services:
  db:
    image: postgres:16-alpine
    container_name: crz_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crz_local}
      POSTGRES_DB: crz_monitor
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 256m
    mem_limit: 512m
    memswap_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crz -d crz_monitor"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
