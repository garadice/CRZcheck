services:
  db:
    restart: always
    mem_limit: 1g
    memswap_limit: 1g
    shm_size: 512m
    ports: !override
      - "127.0.0.1:5433:5432"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
